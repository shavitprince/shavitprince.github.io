<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shavit Prince | Connection Between Cultures</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet"/>

<style>
/* ============================================================
   DESIGN TOKENS — DO NOT EDIT UNLESS CHANGING THE LOOK
   ============================================================ */
:root {
  --black:   #0a0a0a;
  --dark:    #111111;
  --dark2:   #1a1a1a;
  --gold:    #c9a84c;
  --gold2:   #e8c97a;
  --white:   #f5f0e8;
  --grey:    #888;
  --light:   #d4cfc6;
  --font-display: 'Playfair Display', serif;
  --font-body:    'Cormorant Garamond', serif;
  --font-ui:      'Montserrat', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--black);
  color: var(--white);
  font-family: var(--font-body);
  font-size: 18px;
  line-height: 1.7;
  overflow-x: hidden;
}

/* ── NAV ─────────────────────────────────────────────────── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 22px 60px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.85), transparent);
  transition: background 0.4s;
}
nav.scrolled { background: rgba(10,10,10,0.97); }

.nav-logo {
  font-family: var(--font-display);
  font-size: 1.3rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--gold);
  text-decoration: none;
}

.nav-links { display: flex; gap: 36px; list-style: none; }
.nav-links a {
  font-family: var(--font-ui);
  font-size: 0.72rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--light);
  text-decoration: none;
  transition: color 0.3s;
}
.nav-links a:hover { color: var(--gold); }

.nav-toggle { display: none; flex-direction: column; gap: 5px; cursor: pointer; }
.nav-toggle span { width: 26px; height: 1px; background: var(--white); transition: all 0.3s; }

/* ── HERO ────────────────────────────────────────────────── */
#hero {
  position: relative; height: 100vh; min-height: 600px;
  display: flex; align-items: flex-end;
  overflow: hidden;
}

.hero-bg {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, #1a0e05 0%, #0a0a0a 40%, #0d1a10 100%);
}

/* Decorative geometric overlay */
.hero-pattern {
  position: absolute; inset: 0; opacity: 0.06;
  background-image:
    repeating-linear-gradient(45deg, var(--gold) 0, var(--gold) 1px, transparent 0, transparent 50%),
    repeating-linear-gradient(-45deg, var(--gold) 0, var(--gold) 1px, transparent 0, transparent 50%);
  background-size: 40px 40px;
}

.hero-img {
  position: absolute; inset: 0;
  background-image: var(--hero-image, none);
  background-size: cover; background-position: center top;
  opacity: 0.45;
}

.hero-gradient {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(10,10,10,1) 0%, rgba(10,10,10,0.3) 50%, transparent 100%);
}

.hero-content {
  position: relative; z-index: 2;
  padding: 0 60px 80px;
  max-width: 900px;
  animation: fadeUp 1.2s ease both;
}

.hero-subtitle {
  font-family: var(--font-ui);
  font-size: 0.72rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 18px;
}

.hero-title {
  font-family: var(--font-display);
  font-size: clamp(3.5rem, 8vw, 7rem);
  font-weight: 900;
  line-height: 0.95;
  letter-spacing: -0.01em;
  color: var(--white);
  margin-bottom: 24px;
}

.hero-tagline {
  font-family: var(--font-body);
  font-style: italic;
  font-size: 1.25rem;
  color: var(--light);
  margin-bottom: 40px;
  max-width: 500px;
}

.btn {
  display: inline-block;
  font-family: var(--font-ui);
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 14px 36px;
  border: 1px solid var(--gold);
  color: var(--gold);
  text-decoration: none;
  transition: all 0.3s;
}
.btn:hover { background: var(--gold); color: var(--black); }

/* ── SECTION BASE ────────────────────────────────────────── */
section { padding: 100px 60px; }
.section-label {
  font-family: var(--font-ui);
  font-size: 0.65rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 16px;
}
.section-title {
  font-family: var(--font-display);
  font-size: clamp(2rem, 4vw, 3.2rem);
  font-weight: 700;
  line-height: 1.1;
  color: var(--white);
  margin-bottom: 40px;
}
.divider {
  width: 60px; height: 1px;
  background: var(--gold);
  margin-bottom: 40px;
}

/* ── BIO ─────────────────────────────────────────────────── */
#bio { background: var(--dark); }
.bio-inner {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: start;
  max-width: 1200px; margin: 0 auto;
}
.bio-image {
  aspect-ratio: 3/4;
  overflow: hidden;
  position: relative;
}
.bio-image img {
  width: 100%; height: 100%;
  object-fit: cover;
  filter: grayscale(20%);
  transition: transform 0.6s ease;
}
.bio-image:hover img { transform: scale(1.03); }
.bio-image::after {
  content: '';
  position: absolute; inset: 0;
  border: 1px solid rgba(201,168,76,0.2);
  pointer-events: none;
}

.bio-text p {
  font-size: 1.15rem;
  color: var(--light);
  margin-bottom: 20px;
  font-weight: 300;
}

/* ── PHOTO GALLERY ───────────────────────────────────────── */
#gallery { background: var(--black); }
.gallery-inner { max-width: 1200px; margin: 0 auto; }
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}
.gallery-item {
  aspect-ratio: 1;
  overflow: hidden;
  cursor: pointer;
  position: relative;
}
.gallery-item img {
  width: 100%; height: 100%;
  object-fit: cover;
  filter: grayscale(30%);
  transition: all 0.5s ease;
}
.gallery-item:hover img { transform: scale(1.05); filter: grayscale(0%); }
.gallery-item::after {
  content: '';
  position: absolute; inset: 0;
  background: rgba(201,168,76,0);
  transition: background 0.4s;
}
.gallery-item:hover::after { background: rgba(201,168,76,0.08); }

/* ── MUSIC / DISCOGRAPHY ─────────────────────────────────── */
#music { background: var(--dark2); }
.music-inner { max-width: 1200px; margin: 0 auto; }
.music-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 32px;
}
.album-card { text-align: center; cursor: pointer; }
.album-cover {
  aspect-ratio: 1;
  overflow: hidden;
  margin-bottom: 14px;
  position: relative;
}
.album-cover img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 0.4s;
  filter: grayscale(20%);
}
.album-cover:hover img { transform: scale(1.04); filter: grayscale(0%); }
.album-title {
  font-family: var(--font-display);
  font-size: 1rem;
  color: var(--white);
  margin-bottom: 4px;
}
.album-year {
  font-family: var(--font-ui);
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  color: var(--grey);
}
.album-card a { text-decoration: none; }

.music-embed { max-width: 1200px; margin: 60px auto 0; }
.music-embed iframe { width: 100%; border-radius: 0; border: none; }

/* ── TOUR DATES ──────────────────────────────────────────── */
#tour { background: var(--dark); }
.tour-inner { max-width: 900px; margin: 0 auto; }
.tour-table { width: 100%; border-collapse: collapse; }
.tour-table thead tr {
  border-bottom: 1px solid rgba(201,168,76,0.3);
}
.tour-table th {
  font-family: var(--font-ui);
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
  padding: 0 0 16px;
  text-align: left;
}
.tour-table th:last-child { text-align: right; }
.tour-row {
  border-bottom: 1px solid rgba(255,255,255,0.06);
  transition: background 0.2s;
}
.tour-row:hover { background: rgba(201,168,76,0.04); }
.tour-row td {
  padding: 22px 0;
  vertical-align: middle;
}
.tour-date {
  font-family: var(--font-ui);
  font-size: 0.75rem;
  letter-spacing: 0.1em;
  color: var(--gold);
  white-space: nowrap;
  padding-right: 30px;
}
.tour-venue {
  font-family: var(--font-display);
  font-size: 1.1rem;
  color: var(--white);
}
.tour-city {
  font-family: var(--font-body);
  font-size: 0.95rem;
  color: var(--grey);
  font-style: italic;
}
.tour-ticket {
  text-align: right;
}
.ticket-link {
  font-family: var(--font-ui);
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--gold);
  text-decoration: none;
  border: 1px solid rgba(201,168,76,0.4);
  padding: 8px 18px;
  transition: all 0.3s;
  white-space: nowrap;
}
.ticket-link:hover { background: var(--gold); color: var(--black); }
.no-dates {
  font-family: var(--font-body);
  font-style: italic;
  color: var(--grey);
  padding: 30px 0;
}

/* ── CONTACT ─────────────────────────────────────────────── */
#contact { background: var(--black); }
.contact-inner {
  max-width: 900px; margin: 0 auto;
  display: grid; grid-template-columns: 1fr 1fr; gap: 80px;
}
.contact-info p {
  font-size: 1rem; color: var(--light); margin-bottom: 12px;
}
.contact-info a { color: var(--gold); text-decoration: none; }
.contact-info a:hover { text-decoration: underline; }

.contact-socials { display: flex; gap: 20px; margin-top: 30px; flex-wrap: wrap; }
.social-link {
  font-family: var(--font-ui);
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--grey);
  text-decoration: none;
  border-bottom: 1px solid transparent;
  padding-bottom: 2px;
  transition: all 0.3s;
}
.social-link:hover { color: var(--gold); border-color: var(--gold); }

.contact-form { display: flex; flex-direction: column; gap: 16px; }
.contact-form input,
.contact-form textarea {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--white);
  padding: 14px 18px;
  font-family: var(--font-body);
  font-size: 1rem;
  outline: none;
  transition: border-color 0.3s;
  resize: none;
}
.contact-form input:focus,
.contact-form textarea:focus { border-color: var(--gold); }
.contact-form input::placeholder,
.contact-form textarea::placeholder { color: var(--grey); }
.contact-form button {
  align-self: flex-start;
  background: transparent;
  cursor: pointer;
  font-family: var(--font-ui);
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 14px 36px;
  border: 1px solid var(--gold);
  color: var(--gold);
  transition: all 0.3s;
}
.contact-form button:hover { background: var(--gold); color: var(--black); }

/* ── FOOTER ──────────────────────────────────────────────── */
footer {
  background: #060606;
  padding: 50px 60px;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 20px;
  border-top: 1px solid rgba(201,168,76,0.15);
}
.footer-logo {
  font-family: var(--font-display);
  font-size: 1.1rem;
  color: var(--gold);
  text-decoration: none;
}
.footer-copy {
  font-family: var(--font-ui);
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  color: var(--grey);
  text-align: center;
}
.footer-links { display: flex; gap: 24px; }
.footer-links a {
  font-family: var(--font-ui);
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--grey);
  text-decoration: none;
  transition: color 0.3s;
}
.footer-links a:hover { color: var(--gold); }

/* ── LIGHTBOX ────────────────────────────────────────────── */
.lightbox {
  display: none; position: fixed; inset: 0; z-index: 999;
  background: rgba(0,0,0,0.92);
  align-items: center; justify-content: center;
}
.lightbox.open { display: flex; }
.lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; }
.lightbox-close {
  position: fixed; top: 30px; right: 40px;
  font-size: 2rem; color: var(--white); cursor: pointer; line-height: 1;
}

/* ── ANIMATIONS ──────────────────────────────────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(40px); }
  to   { opacity: 1; transform: translateY(0); }
}
.reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.8s ease, transform 0.8s ease; }
.reveal.visible { opacity: 1; transform: none; }

/* ── RESPONSIVE ──────────────────────────────────────────── */
@media (max-width: 900px) {
  nav { padding: 18px 24px; }
  .nav-links { display: none; }
  .nav-toggle { display: flex; }
  .nav-links.open {
    display: flex; flex-direction: column;
    position: fixed; inset: 0; background: var(--black);
    align-items: center; justify-content: center; gap: 32px;
  }
  .nav-links.open a { font-size: 1.1rem; }

  section { padding: 70px 24px; }
  .hero-content { padding: 0 24px 60px; }

  .bio-inner { grid-template-columns: 1fr; gap: 40px; }
  .contact-inner { grid-template-columns: 1fr; gap: 50px; }
  .gallery-grid { grid-template-columns: repeat(2, 1fr); }
  .music-grid { grid-template-columns: repeat(2, 1fr); }
  footer { padding: 40px 24px; flex-direction: column; text-align: center; }
  .footer-links { justify-content: center; }
}
</style>
</head>

      <div class="contact-form">
        <input type="text"  placeholder="Your Name"    id="cf-name" />
        <input type="email" placeholder="Your Email"   id="cf-email" />
        <input type="text"  placeholder="Subject"      id="cf-subject" />
        <textarea rows="5"  placeholder="Your message..." id="cf-message"></textarea>
        <button onclick="sendEmail()">Send Message</button>
      </div>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <a class="footer-logo" href="#hero" id="footer-logo"></a>
  <p class="footer-copy" id="footer-copy"></p>
  <div class="footer-links" id="footer-links"></div>
</footer>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <span class="lightbox-close" onclick="closeLightbox()">&#215;</span>
  <img id="lightbox-img" src="" alt="" />
</div>

<script>
// ── BUILD PAGE FROM CONFIG ──────────────────────────────────

document.getElementById('nav-logo-text').textContent = SITE.artistName;
document.getElementById('hero-subtitle').textContent = SITE.projectName;
document.getElementById('hero-title').textContent    = SITE.artistName;
document.getElementById('hero-tagline').textContent  = SITE.tagline;
const heroBtn = document.getElementById('hero-btn');
heroBtn.textContent = SITE.heroBtn.text;
heroBtn.href = SITE.heroBtn.link;
document.getElementById('hero-img').style.backgroundImage = `url('${SITE.heroImage}')`;
document.getElementById('bio-title').textContent = SITE.artistName + ' Bio';
document.getElementById('bio-img').src = SITE.bioImage;

// Bio paragraphs
const bioCont = document.getElementById('bio-paragraphs');
SITE.bioText.forEach(p => {
  const el = document.createElement('p'); el.textContent = p; bioCont.appendChild(el);
});

// Gallery
const grid = document.getElementById('gallery-grid');
SITE.photos.forEach(photo => {
  const item = document.createElement('div');
  item.className = 'gallery-item';
  item.innerHTML = `<img src="${photo.src}" alt="${photo.alt}" loading="lazy" />`;
  item.addEventListener('click', () => openLightbox(photo.src, photo.alt));
  grid.appendChild(item);
});

// Albums
const musicGrid = document.getElementById('music-grid');
SITE.albums.forEach(album => {
  musicGrid.innerHTML += `
    <div class="album-card">
      <a href="${album.link}" target="_blank" rel="noopener">
        <div class="album-cover"><img src="${album.cover}" alt="${album.title}" loading="lazy" /></div>
        <p class="album-title">${album.title}</p>
        <p class="album-year">${album.year}</p>
      </a>
    </div>`;
});

// Embed
if (SITE.showEmbed && SITE.embedUrl) {
  document.getElementById('music-embed').innerHTML =
    `<iframe src="${SITE.embedUrl}" height="152" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>`;
}

// Tour dates
const tourCont = document.getElementById('tour-content');
if (!SITE.tourDates.length) {
  tourCont.innerHTML = `<p class="no-dates">No upcoming tour dates. Check back soon.</p>`;
} else {
  let rows = SITE.tourDates.map(d => `
    <tr class="tour-row">
      <td class="tour-date">${d.date}</td>
      <td><div class="tour-venue">${d.venue}</div><div class="tour-city">${d.city}</div></td>
      <td class="tour-ticket"><a class="ticket-link" href="${d.ticketLink}" target="_blank">Tickets</a></td>
    </tr>`).join('');
  tourCont.innerHTML = `
    <table class="tour-table">
      <thead><tr>
        <th>Date</th><th>Venue / City</th><th style="text-align:right">Tickets</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// Contact info
const ci = document.getElementById('contact-info');
ci.innerHTML = `
  <p>📧 <a href="mailto:${SITE.contactEmail}">${SITE.contactEmail}</a></p>
  <p>📞 ${SITE.contactPhone}</p>
  <p>🎤 Bookings: <a href="mailto:${SITE.contactBookings}">${SITE.contactBookings}</a></p>
  <p>📍 ${SITE.contactAddress}</p>`;

const socLinks = document.createElement('div');
socLinks.className = 'contact-socials';
const socMap = {
  instagram: 'Instagram', facebook: 'Facebook',
  spotify: 'Spotify', youtube: 'YouTube', soundcloud: 'SoundCloud'
};
Object.entries(SITE.socials).forEach(([k, v]) => {
  if (v) {
    const a = document.createElement('a');
    a.href = v; a.className = 'social-link';
    a.textContent = socMap[k]; a.target = '_blank'; a.rel = 'noopener';
    socLinks.appendChild(a);
  }
});
ci.appendChild(socLinks);

// Footer
document.getElementById('footer-logo').textContent = SITE.artistName;
document.getElementById('footer-copy').textContent = SITE.footerNote;
const fl = document.getElementById('footer-links');
['Bio','Gallery','Music','Tour','Contact'].forEach(t => {
  fl.innerHTML += `<a href="#${t.toLowerCase()}">${t}</a>`;
});

// ── NAV SCROLL ──────────────────────────────────────────────
window.addEventListener('scroll', () => {
  document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 60);
});

// ── NAV MOBILE ──────────────────────────────────────────────
document.getElementById('nav-toggle').addEventListener('click', () => {
  document.getElementById('nav-links').classList.toggle('open');
});
document.querySelectorAll('.nav-links a').forEach(a => {
  a.addEventListener('click', () => document.getElementById('nav-links').classList.remove('open'));
});

// ── SCROLL REVEAL ───────────────────────────────────────────
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); } });
}, { threshold: 0.12 });
document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

// ── LIGHTBOX ────────────────────────────────────────────────
function openLightbox(src, alt) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox-img').alt = alt;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
});

// ── CONTACT FORM (opens email client) ───────────────────────
function sendEmail() {
  const name    = document.getElementById('cf-name').value;
  const email   = document.getElementById('cf-email').value;
  const subject = document.getElementById('cf-subject').value;
  const message = document.getElementById('cf-message').value;
  if (!name || !email || !message) { alert('Please fill in your name, email, and message.'); return; }
  const mailto = `mailto:${SITE.contactEmail}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent('From: ' + name + ' <' + email + '>\n\n' + message)}`;
  window.location.href = mailto;
}
</script>
</body>
</html>
