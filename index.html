<script>
// ── BUILD PAGE FROM CONFIG ──────────────────────────────────

document.getElementById('nav-logo-text').textContent = SITE.artistName;
document.getElementById('hero-subtitle').textContent = SITE.projectName;
document.getElementById('hero-title').textContent    = SITE.artistName;
document.getElementById('hero-tagline').textContent  = SITE.tagline;
const heroBtn = document.getElementById('hero-btn');
heroBtn.textContent = SITE.heroBtn.text;
heroBtn.href        = SITE.heroBtn.link;
document.getElementById('hero-img').style.backgroundImage = `url('${SITE.heroImage}')`;
document.getElementById('bio-title').textContent = SITE.artistName + ' Bio';
document.getElementById('bio-img').src = SITE.bioImage;

// Bio paragraphs
const bioCont = document.getElementById('bio-paragraphs');
SITE.bioText.forEach(p => {
  const el = document.createElement('p'); el.textContent = p; bioCont.appendChild(el);
});

// Gallery
const grid = document.getElementById('gallery-grid');
SITE.photos.forEach((photo, i) => {
  const item = document.createElement('div');
  item.className = 'gallery-item';
  item.innerHTML = `<img src="${photo.src}" alt="${photo.alt}" loading="lazy" />`;
  item.addEventListener('click', () => openLightbox(i));
  grid.appendChild(item);
});

// Albums
const musicGrid = document.getElementById('music-grid');
SITE.albums.forEach(album => {
  musicGrid.innerHTML += `
    <div class="album-card">
      <a href="${album.link}" target="_blank" rel="noopener">
        <div class="album-cover"><img src="${album.cover}" alt="${album.title}" loading="lazy" /></div>
        <p class="album-title">${album.title}</p>
        <p class="album-year">${album.year}</p>
      </a>
    </div>`;
});

// Full Catalog link
if (SITE.fullCatalogLink) {
  document.getElementById('full-catalog-wrap').innerHTML =
    `<a class="full-catalog-link" href="${SITE.fullCatalogLink}" target="_blank" rel="noopener">${SITE.fullCatalogText}</a>`;
}

// Embed
if (SITE.showEmbed && SITE.embedUrl) {
  document.getElementById('music-embed').innerHTML =
    `<iframe src="${SITE.embedUrl}" height="152" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>`;
}

// Videos
const videosGrid = document.getElementById('videos-grid');
const videosSection = document.getElementById('videos');
if (!SITE.videos || SITE.videos.length === 0) {
  videosSection.style.display = 'none';
} else {
  SITE.videos.forEach(v => {
    videosGrid.innerHTML += `
      <div class="video-card">
        <div class="video-embed-wrapper">
          <iframe src="https://www.youtube.com/embed/${v.embedId}" title="${v.title}"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen loading="lazy"></iframe>
        </div>
        <p class="video-caption">${v.caption}</p>
        <p class="video-title">${v.title}</p>
      </div>`;
  });
}

// Projects
const projectsGrid = document.getElementById('projects-grid');
const projectsSection = document.getElementById('projects');
if (!SITE.projects || SITE.projects.length === 0) {
  projectsGrid.innerHTML = `<p class="no-dates">🎶 Projects coming soon — stay tuned!</p>`;
} else {
  SITE.projects.forEach(p => {
    projectsGrid.innerHTML += `
      <div class="project-card">
        <div class="project-img">
          <img src="${p.image}" alt="${p.name}" loading="lazy" />
        </div>
        <div class="project-body">
          <p class="project-tag">${p.tag}</p>
          <p class="project-name">${p.name}</p>
          <p class="project-desc">${p.desc}</p>
          ${p.link ? `<a class="project-link" href="${p.link}">${p.linkText || 'Learn More'} →</a>` : ''}
        </div>
      </div>`;
  });
}

// Press Kit
const presskitLayout = document.getElementById('presskit-layout');
// Left: quotes
let quotesHTML = '<div class="presskit-quotes">';
SITE.pressQuotes.forEach(q => {
  quotesHTML += `
    <div class="presskit-quote-block">
      <p class="presskit-quote">"${q.quote}"</p>
      <p class="presskit-quote-source">— ${q.source}</p>
    </div>`;
});
quotesHTML += '</div>';

// Right: downloads + press contact
let downloadsHTML = '<div>';
downloadsHTML += '<p class="section-label" style="margin-bottom:20px;">Downloads</p>';
downloadsHTML += '<div class="presskit-downloads">';
SITE.pressDownloads.forEach(d => {
  downloadsHTML += `
    <div class="press-download-item">
      <div class="press-dl-info">
        <span class="press-dl-name">${d.name}</span>
        <span class="press-dl-meta">${d.meta}</span>
      </div>
      <a class="press-dl-btn" href="${d.href}" target="_blank" rel="noopener">Download</a>
    </div>`;
});
downloadsHTML += '</div>';
downloadsHTML += `
  <div class="press-contact-block">
    <p class="press-contact-label">Press &amp; Media Inquiries</p>
    <p>📧 <a href="mailto:${SITE.pressContactEmail}">${SITE.pressContactEmail}</a></p>
  </div>
</div>`;

presskitLayout.innerHTML = `<p class="no-dates">🎶 Press Kit coming soon — stay tuned!</p>`;

// Tour dates
const tourCont = document.getElementById('tour-content');
if (!SITE.tourDates.length) {
  tourCont.innerHTML = `<p class="no-dates">🎶 Tour dates coming soon — stay tuned!</p>`;
} else {
  let rows = SITE.tourDates.map(d => `
    <tr class="tour-row">
      <td class="tour-date">${d.date}</td>
      <td><div class="tour-venue">${d.venue}</div><div class="tour-city">${d.city}</div></td>
      <td class="tour-ticket"><a class="ticket-link" href="${d.ticketLink}" target="_blank">Tickets</a></td>
    </tr>`).join('');
  tourCont.innerHTML = `
    <table class="tour-table">
      <thead><tr>
        <th>Date</th><th>Venue / City</th><th style="text-align:right">Tickets</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// Contact info
const ci = document.getElementById('contact-info');
ci.innerHTML = `
  <p>📧 <a href="mailto:${SITE.contactEmail}">${SITE.contactEmail}</a></p>
  ${SITE.contactPhone ? `<p>📞 ${SITE.contactPhone}</p>` : ''}
  <p>🎤 Bookings: <a href="mailto:${SITE.contactBookings}">${SITE.contactBookings}</a></p>
  <p>📍 ${SITE.contactAddress}</p>`;

const socLinks = document.createElement('div');
socLinks.className = 'contact-socials';
const socMap = {
  instagram: 'Instagram', facebook: 'Facebook',
  spotify: 'Spotify', youtube: 'YouTube', soundcloud: 'SoundCloud'
};
Object.entries(SITE.socials).forEach(([k, v]) => {
  if (v) {
    const a = document.createElement('a');
    a.href = v; a.className = 'social-link';
    a.textContent = socMap[k]; a.target = '_blank'; a.rel = 'noopener';
    socLinks.appendChild(a);
  }
});
ci.appendChild(socLinks);

// Footer
document.getElementById('footer-logo').textContent = SITE.artistName;
document.getElementById('footer-copy').textContent = SITE.footerNote;
const fl = document.getElementById('footer-links');
['Bio','Gallery','Music','Videos','Projects','Press','Tour','Contact'].forEach(t => {
  const id = t === 'Press' ? 'presskit' : t.toLowerCase();
  fl.innerHTML += `<a href="#${id}">${t}</a>`;
});

// ── NAV SCROLL ──────────────────────────────────────────────
window.addEventListener('scroll', () => {
  document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 60);
});

// ── NAV MOBILE ──────────────────────────────────────────────
document.getElementById('nav-toggle').addEventListener('click', () => {
  document.getElementById('nav-links').classList.toggle('open');
});
document.querySelectorAll('.nav-links a').forEach(a => {
  a.addEventListener('click', () => document.getElementById('nav-links').classList.remove('open'));
});

// ── SCROLL REVEAL ───────────────────────────────────────────
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.10 });
document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

// ── LIGHTBOX with left/right navigation ─────────────────────
let currentLightboxIndex = 0;

function openLightbox(index) {
  currentLightboxIndex = index;
  updateLightboxImage();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function updateLightboxImage() {
  const photo = SITE.photos[currentLightboxIndex];
  const img = document.getElementById('lightbox-img');
  img.style.opacity = '0';
  setTimeout(() => {
    img.src = photo.src;
    img.alt = photo.alt;
    img.style.opacity = '1';
  }, 150);
  document.getElementById('lightbox-counter').textContent =
    (currentLightboxIndex + 1) + ' / ' + SITE.photos.length;
}

function lightboxNav(direction) {
  currentLightboxIndex = (currentLightboxIndex + direction + SITE.photos.length) % SITE.photos.length;
  updateLightboxImage();
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

// Click outside image to close
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox') ||
      e.target.className === 'lightbox-main') closeLightbox();
});

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'ArrowLeft')  lightboxNav(-1);
  if (e.key === 'ArrowRight') lightboxNav(1);
  if (e.key === 'Escape')     closeLightbox();
});

// Touch swipe support
let touchStartX = 0;
document.getElementById('lightbox').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
}, { passive: true });
document.getElementById('lightbox').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) lightboxNav(dx < 0 ? 1 : -1);
}, { passive: true });

// ── CONTACT FORM (opens email client) ───────────────────────
async function sendEmail() {
  const name    = document.getElementById('cf-name').value;
  const email   = document.getElementById('cf-email').value;
  const subject = document.getElementById('cf-subject').value;
  const message = document.getElementById('cf-message').value;
  if (!name || !email || !message) { alert('Please fill in your name, email, and message.'); return; }
  
  const response = await fetch('https://formspree.io/f/mpqeypzk', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, email, subject, message })
  });
  
  if (response.ok) {
    alert('Message sent successfully! We will get back to you soon.');
    document.getElementById('cf-name').value = '';
    document.getElementById('cf-email').value = '';
    document.getElementById('cf-subject').value = '';
    document.getElementById('cf-message').value = '';
  } else {
    alert('Oops! Something went wrong. Please try again.');
  }
}
</script>
